name: Binary Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update, for example overlay-v0.6.93.1
        required: true
      release_name:
        description: Optional display name for the GitHub release
        required: false
        default: ""
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        type: boolean
        default: true
  push:
    tags:
      - overlay-v*

concurrency:
  group: binary-release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      toolchain: ${{ steps.rust_toolchain.outputs.channel }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
            prerelease=false
            release_name="Code ${tag}"
          else
            tag="${{ inputs.release_tag }}"
            prerelease="${{ inputs.prerelease }}"
            release_name="${{ inputs.release_name }}"
            if [[ -z "${release_name}" ]]; then
              release_name="Code ${tag}"
            fi
          fi

          {
            echo "tag=${tag}"
            echo "release_name=${release_name}"
            echo "prerelease=${prerelease}"
          } >> "$GITHUB_OUTPUT"

      - name: Read Rust toolchain channel
        id: rust_toolchain
        shell: bash
        run: |
          set -euo pipefail
          toolchain=$(python3 - <<'PY'
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("code-rs/rust-toolchain.toml").read_text())
          print(data["toolchain"]["channel"])
          PY
          )
          echo "channel=${toolchain}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: metadata
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            artifact: code-x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact: code-aarch64-unknown-linux-musl
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: code-x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: code-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: code-x86_64-pc-windows-msvc.exe
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo-home
      RUSTUP_HOME: ${{ github.workspace }}/.cargo-home/rustup
      CARGO_TARGET_DIR: ${{ github.workspace }}/code-rs/target
      CARGO_TERM_COLOR: always

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ needs.metadata.outputs.toolchain }}
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2-binary-release
          shared-key: binary-release-${{ matrix.target }}-${{ needs.metadata.outputs.toolchain }}
          workspaces: |
            code-rs -> target
          cache-targets: true
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9
        with:
          version: v0.10.0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable sccache
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "SCCACHE_IDLE_TIMEOUT=1800" >> "$GITHUB_ENV"
          echo "SCCACHE_CACHE_SIZE=10G" >> "$GITHUB_ENV"

      - name: Linux (musl) tuning
        if: contains(matrix.os, 'ubuntu') && contains(matrix.target, 'musl')
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config zstd
          echo 'CC=musl-gcc' >> "$GITHUB_ENV"
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl) echo 'CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc' >> "$GITHUB_ENV" ;;
            aarch64-unknown-linux-musl) echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc' >> "$GITHUB_ENV" ;;
          esac
          echo 'PKG_CONFIG_ALLOW_CROSS=1' >> "$GITHUB_ENV"
          echo 'OPENSSL_STATIC=1' >> "$GITHUB_ENV"
          echo 'RUSTFLAGS=-Awarnings -C debuginfo=0 -C strip=symbols -C panic=abort' >> "$GITHUB_ENV"

      - name: macOS tuning
        if: startsWith(matrix.os, 'macos-')
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zstd >/dev/null 2>&1; then
            brew install zstd
          fi
          echo 'CC=sccache clang' >> "$GITHUB_ENV"
          echo 'CXX=sccache clang++' >> "$GITHUB_ENV"
          echo 'RUSTFLAGS=-Awarnings -C debuginfo=0 -C strip=symbols -C panic=abort' >> "$GITHUB_ENV"

      - name: Windows tuning
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          "LIBGIT2_SYS_USE_SCHANNEL=1" >> $env:GITHUB_ENV
          "CURL_SSL_BACKEND=schannel" >> $env:GITHUB_ENV
          if (Get-Command lld-link -ErrorAction SilentlyContinue) {
            "RUSTFLAGS=-Awarnings -Clinker=lld-link -C debuginfo=0 -C strip=symbols -C panic=abort -C link-arg=/OPT:REF -C link-arg=/OPT:ICF -C link-arg=/DEBUG:NONE" >> $env:GITHUB_ENV
          } else {
            "RUSTFLAGS=-Awarnings -C debuginfo=0 -C strip=symbols -C panic=abort -C link-arg=/OPT:REF -C link-arg=/OPT:ICF -C link-arg=/DEBUG:NONE" >> $env:GITHUB_ENV
          }

      - name: Prefetch Rust dependencies
        working-directory: code-rs
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo fetch --locked

      - name: Build release binary
        working-directory: code-rs
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${{ matrix.target }}" --bin code

      - name: Smoke test release binary [Unix]
        if: |
          (matrix.os == 'ubuntu-24.04' && matrix.target == 'x86_64-unknown-linux-musl') ||
          (matrix.os == 'ubuntu-24.04-arm' && matrix.target == 'aarch64-unknown-linux-musl') ||
          (startsWith(matrix.os, 'macos-') && matrix.target == 'aarch64-apple-darwin')
        shell: bash
        run: |
          set -euo pipefail
          exe="code-rs/target/${{ matrix.target }}/release/code"
          "$exe" --version
          "$exe" completion bash > /dev/null

      - name: Smoke test release binary [Windows]
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $exe = "code-rs/target/${{ matrix.target }}/release/code.exe"
          & $exe --version | Out-Null
          & $exe completion bash | Out-Null

      - name: Prepare artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "code-rs/target/${{ matrix.target }}/release/code.exe" "artifacts/${{ matrix.artifact }}"
          else
            cp "code-rs/target/${{ matrix.target }}/release/code" "artifacts/${{ matrix.artifact }}"
          fi

      - name: Compress artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem artifacts -File | ForEach-Object {
            $src = $_.FullName
            $dst = "$src.zip"
            Compress-Archive -Path $src -DestinationPath $dst -Force
            Remove-Item $src -Force
          }

      - name: Compress artifacts (*nix dual-format)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in artifacts/*; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            if command -v zstd >/dev/null 2>&1; then
              zstd -T0 -19 --force -o "artifacts/${base}.zst" "$f"
            fi
            tar -C artifacts -czf "artifacts/${base}.tar.gz" "$base"
            rm -f "$f"
          done

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-release-${{ matrix.target }}
          path: artifacts/
          compression-level: 0

  publish:
    name: Publish GitHub release
    needs: [metadata, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release bundle
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          while IFS= read -r -d '' f; do
            cp "$f" dist/
          done < <(find artifacts -type f -name 'code-*' -print0)

          sha256sum dist/* > dist/SHA256SUMS.txt

          {
            echo "Built from ref ${GITHUB_REF_NAME}"
            echo ""
            echo "Commit: ${GITHUB_SHA}"
            echo ""
            echo "Assets:"
            find dist -maxdepth 1 -type f -printf ' - %f\n' | sort
          } > dist/RELEASE_NOTES.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.metadata.outputs.release_name }}
          prerelease: ${{ needs.metadata.outputs.prerelease == 'true' }}
          body_path: dist/RELEASE_NOTES.txt
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
