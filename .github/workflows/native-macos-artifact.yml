---
name: Native macOS Artifact

'on':
  push:
    tags:
      - 'macos-v*'
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: native-macos-artifact-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos-artifact:
    name: Build macOS artifact
    runs-on: macos-15
    env:
      STAGE_DIR: /tmp/ecc-macos
      DERIVED_DATA_PATH: /tmp/ecc-macos/DerivedData
      APP_BUNDLE_NAME: EveryCodeCompanion.app
      SCHEME: CodeNativeMac
      XCODE_PROJECT: native/CodeNativeMac/CodeNativeMac.xcodeproj
      ENTITLEMENTS_PATH: >-
        native/CodeNativeMac/CodeNativeMac/CodeNativeMac.entitlements
      SIGNING_IDENTITY_PATH: /tmp/ecc-macos/signing-identity.txt
    steps:
      - name: Resolve checkout ref
        id: resolve_ref
        run: |
          set -euo pipefail
          ref="$GITHUB_REF"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
            && [ -n "${{ github.event.inputs.git_ref }}" ]; then
            ref="${{ github.event.inputs.git_ref }}"
          fi
          echo "value=$ref" >> "$GITHUB_OUTPUT"

      - name: Resolve marketing version
        id: marketing_version
        run: |
          set -euo pipefail
          candidate="${{ steps.resolve_ref.outputs.value }}"
          case "$candidate" in
            refs/tags/*)
              candidate="${candidate#refs/tags/}"
              ;;
          esac

          version=""
          if [[ "$candidate" =~ ^macos-v(.+)$ ]]; then
            version="${BASH_REMATCH[1]}"
            echo "Resolved MARKETING_VERSION=$version"
            echo "value=$version" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.ref }}" =~ ^refs/tags/macos-v.+$ ]]; then
            echo "Failed to resolve MARKETING_VERSION from tag:" >&2
            echo "${{ github.ref }}" >&2
            exit 1
          fi

          echo "No macOS release tag detected;"
          echo "using project MARKETING_VERSION"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve_ref.outputs.value }}

      - name: Build managed backend
        run: |
          set -euo pipefail
          ./build-fast.sh

      - name: Validate release-signing secrets
        env:
          MACOS_DEV_ID_APP_CERT_P12_BASE64:
            ${{ secrets.MACOS_DEV_ID_APP_CERT_P12_BASE64 }}
          MACOS_DEV_ID_APP_CERT_PASSWORD:
            ${{ secrets.MACOS_DEV_ID_APP_CERT_PASSWORD }}
          MACOS_APPSTORE_PROFILE_BASE64:
            ${{ secrets.MACOS_APPSTORE_PROFILE_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:
            ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY:
            ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            MACOS_DEV_ID_APP_CERT_P12_BASE64 \
            MACOS_DEV_ID_APP_CERT_PASSWORD \
            MACOS_APPSTORE_PROFILE_BASE64 \
            APP_STORE_CONNECT_KEY_ID \
            APP_STORE_CONNECT_ISSUER_ID \
            APP_STORE_CONNECT_PRIVATE_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required secrets:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Import Developer ID Application certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_DEV_ID_APP_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_DEV_ID_APP_CERT_PASSWORD }}
          keychain: signing_temp
          keychain-password: ${{ github.run_id }}

      - name: Resolve Developer ID signing identity
        run: |
          set -euo pipefail
          identity=$(security find-identity -v -p codesigning | \
            sed -n 's/.*"\(Developer ID Application: [^"]*\)".*/\1/p' | \
            head -n1)
          if [ -z "$identity" ]; then
            echo "Missing Developer ID Application identity in keychain" >&2
            security find-identity -v -p codesigning || true
            exit 1
          fi

          mkdir -p "$(dirname "$SIGNING_IDENTITY_PATH")"
          printf '%s' "$identity" > "$SIGNING_IDENTITY_PATH"
          echo "Using signing identity: $identity"

      - name: Build release app
        env:
          MARKETING_VERSION_OVERRIDE: >-
            ${{ steps.marketing_version.outputs.value }}
        run: |
          set -euo pipefail

          build_cmd=(
            xcodebuild
            -project "$XCODE_PROJECT"
            -scheme "$SCHEME"
            -configuration Release
            -destination "generic/platform=macOS"
            -derivedDataPath "$DERIVED_DATA_PATH"
            CODE_SIGNING_ALLOWED=NO
            CODE_SIGNING_REQUIRED=NO
          )

          if [ -n "${MARKETING_VERSION_OVERRIDE:-}" ]; then
            echo "Building with MARKETING_VERSION=$MARKETING_VERSION_OVERRIDE"
            build_cmd+=("MARKETING_VERSION=$MARKETING_VERSION_OVERRIDE")
          fi

          build_cmd+=(build)
          "${build_cmd[@]}"

      - name: Sign macOS app bundle
        env:
          MARKETING_VERSION_OVERRIDE: >-
            ${{ steps.marketing_version.outputs.value }}
          MACOS_APPSTORE_PROFILE_BASE64:
            ${{ secrets.MACOS_APPSTORE_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          set_plist_string() {
            local plist_path="$1"
            local key="$2"
            local value="$3"
            /usr/libexec/PlistBuddy \
              -c "Set :$key $value" \
              "$plist_path" \
              >/dev/null 2>&1 || \
              /usr/libexec/PlistBuddy \
                -c "Add :$key string $value" \
                "$plist_path"
          }

          app_source="$DERIVED_DATA_PATH/Build/Products/Release/$APP_BUNDLE_NAME"
          if [ ! -d "$app_source" ]; then
            echo "missing app bundle at $app_source" >&2
            exit 1
          fi

          if [ -n "${MARKETING_VERSION_OVERRIDE:-}" ]; then
            app_info_plist="$app_source/Contents/Info.plist"
            set_plist_string \
              "$app_info_plist" \
              "CFBundleShortVersionString" \
              "$MARKETING_VERSION_OVERRIDE"
            backend_info_plist="$app_source/Contents/Resources/backend/"
            backend_info_plist+="CodeBackend.app/Contents/Info.plist"
            if [ -f "$backend_info_plist" ]; then
              set_plist_string \
                "$backend_info_plist" \
                "CFBundleShortVersionString" \
                "$MARKETING_VERSION_OVERRIDE"
            fi
          fi

          identity="$(cat "$SIGNING_IDENTITY_PATH")"
          mkdir -p "$STAGE_DIR"

          embedded_profile_path="$STAGE_DIR/embedded.provisionprofile"
          echo "$MACOS_APPSTORE_PROFILE_BASE64" | base64 --decode \
            > "$embedded_profile_path"
          cp "$embedded_profile_path" \
            "$app_source/Contents/embedded.provisionprofile"

          entitlements_for_signing="$STAGE_DIR/signing-entitlements.plist"
          cp "$ENTITLEMENTS_PATH" "$entitlements_for_signing"

          # Resolve Team ID + bundle ID explicitly.
          # codesign does not expand Xcode placeholders in raw entitlements.
          team_id=$(printf '%s' "$identity" |
            sed -n 's/.*(\([A-Z0-9]\{10\}\)).*/\1/p')
          bundle_id=$(
            /usr/libexec/PlistBuddy \
              -c 'Print :CFBundleIdentifier' \
              "$app_source/Contents/Info.plist"
          )
          if [ -z "$team_id" ] || [ -z "$bundle_id" ]; then
            echo "Failed to resolve Team ID or bundle identifier" >&2
            echo "for entitlements" >&2
            exit 1
          fi

          /usr/libexec/PlistBuddy \
            -c "Delete :com.apple.developer.ubiquity-kvstore-identifier" \
            "$entitlements_for_signing" \
            >/dev/null 2>&1 || true
          kvstore_id="$team_id.$bundle_id"
          add_kvstore_cmd="Add :com.apple.developer.ubiquity-kvstore-identifier"
          add_kvstore_cmd+=" string $kvstore_id"
          /usr/libexec/PlistBuddy \
            -c "$add_kvstore_cmd" \
            "$entitlements_for_signing"

          backend_bundle="$app_source/Contents/Resources/backend/CodeBackend.app"
          if [ -d "$backend_bundle" ]; then
            if [ -x "$backend_bundle/Contents/MacOS/code" ]; then
              codesign --force \
                --sign "$identity" \
                --timestamp \
                --options runtime \
                "$backend_bundle/Contents/MacOS/code"
            fi

            codesign --force \
              --sign "$identity" \
              --timestamp \
              --options runtime \
              "$backend_bundle"
          fi

          codesign --force \
            --sign "$identity" \
            --timestamp \
            --options runtime \
            --entitlements "$entitlements_for_signing" \
            "$app_source"

          codesign --verify --deep --strict --verbose=2 "$app_source"

      - name: Notarize and staple app
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:
            ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY:
            ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$STAGE_DIR"
          app_source="$DERIVED_DATA_PATH/Build/Products/Release/$APP_BUNDLE_NAME"
          staged_app="$STAGE_DIR/$APP_BUNDLE_NAME"
          notarize_zip="$STAGE_DIR/notarize-input.zip"
          key_path="$STAGE_DIR/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

          rm -rf "$staged_app" "$notarize_zip"
          cp -R "$app_source" "$staged_app"

          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"

          ditto -c -k --sequesterRsrc --keepParent \
            "$staged_app" \
            "$notarize_zip"

          xcrun notarytool submit "$notarize_zip" \
            --key "$key_path" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait

          xcrun stapler staple "$staged_app"
          xcrun stapler validate "$staged_app"
          spctl -a -vv "$staged_app"

      - name: Package artifact
        run: |
          set -euo pipefail
          mkdir -p "$STAGE_DIR"

          staged_app="$STAGE_DIR/$APP_BUNDLE_NAME"
          if [ ! -d "$staged_app" ]; then
            echo "missing staged app bundle at $staged_app" >&2
            exit 1
          fi

          arch="$(uname -m)"
          archive="$STAGE_DIR/EveryCodeCompanion-macos-${arch}.zip"
          rm -f "$archive" "$archive.sha256"
          ditto -c -k --sequesterRsrc --keepParent \
            "$staged_app" \
            "$archive"
          shasum -a 256 "$archive" > "$archive.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
        id: package

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: EveryCodeCompanion-macos
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
          if-no-files-found: error

      - name: Resolve release tag
        id: release_tag
        run: |
          set -euo pipefail
          candidate="${{ steps.resolve_ref.outputs.value }}"
          case "$candidate" in
            refs/tags/*)
              candidate="${candidate#refs/tags/}"
              ;;
          esac

          if [[ "$candidate" =~ ^macos-v.+$ ]]; then
            echo "value=$candidate" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release assets
        if: steps.release_tag.outputs.value != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          name: EveryCodeCompanion ${{ steps.release_tag.outputs.value }}
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
